version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: talentai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - talentai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d talentai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - talentai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - talentai_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - LOG_LEVEL=DEBUG
    volumes:
      - resumes_data:/tmp/resumes
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talentai_network

  worker:
    build: ./worker
    image: hack-worker:latest
    deploy:
      replicas: 1
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=DEBUG
      - BACKEND_URL=http://backend:8000
    volumes:
      - resumes_data:/tmp/resumes
      - ./worker:/app
    command: python -u worker.py
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - talentai_network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - talentai_network

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - talentai_network

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    networks:
      - talentai_network

volumes:
  postgres_data:
  resumes_data:

networks:
  talentai_network:
    driver: bridge
