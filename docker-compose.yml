version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: talentai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - talentai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d talentai"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - talentai_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - talentai_network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 10s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - talentai_network

  worker:
    build: ./worker
    deploy:
      replicas: 2           # 2 workers for parallelisation
    env_file: .env
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - talentai_network

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - talentai_network

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - talentai_network

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    networks:
      - talentai_network

volumes:
  postgres_data:

networks:
  talentai_network:
    driver: bridge
